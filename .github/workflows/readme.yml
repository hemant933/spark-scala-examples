 name: Auto Generate README
 
on:
  workflow_dispatch:   # manual trigger
  push:
    branches: [main]
    paths:
      - "src/**"
      - "pom.xml"
 
jobs:
  generate-readme:
    runs-on: [self-hosted, slz-terraform-runners]
 
    timeout-minutes: 30
 
    permissions:
      contents: write
      models: read
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Install tree
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y tree
 
      - name: Read project structure
        id: structure
        shell: bash
        run: |
          echo "===== PROJECT STRUCTURE (preview) ====="
          tree -L 5 || ls -R
 
          echo "PROJECT_STRUCTURE<<EOF" >> "$GITHUB_OUTPUT"
          (tree -L 5 || ls -R) >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
 
      - name: Extract Scala + Config files (bounded)
        id: code
        shell: bash
        run: |
          echo "===== FILE LIST (preview) ====="
          find src -type f \( -name "*.scala" -o -name "*.properties" \) | head -50
 
          echo "CODE_CONTENT<<EOF" >> "$GITHUB_OUTPUT"
          find src -type f \( -name "*.scala" -o -name "*.properties" \) -print0 \
            | head -z -n 50 \
            | xargs -0 -I{} sh -c 'echo "===== {} ====="; sed -n "1,400p" "{}"; echo' \
            >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
 
      - name: Run AI to generate README
        id: ai
        uses: actions/ai-inference@v1
        with:
          model: gpt-4.1
          prompt: |
            You are an expert Spark Data Engineering documentation specialist.
 
            Generate a comprehensive README.md for this Spark/Scala ETL project.
 
            ========================
            PROJECT STRUCTURE:
            ========================
            ${{ steps.structure.outputs.PROJECT_STRUCTURE }}
 
            ========================
            SOURCE CODE (bounded):
            ========================
            ${{ steps.code.outputs.CODE_CONTENT }}
 
            ========================
            REQUIREMENTS:
            ========================
 
            Follow this exact structure:
 
            1. Project Overview
            - Tech stack (Scala, Spark, Maven)
            - Features
 
            2. Project Structure
            - Directory explanation
 
            3. Data Flow Diagram
            - ASCII diagram (SOURCE → TRANSFORM → TARGET)
            - Include joins, unions, keys
 
            4. Source Tables
            - Extract from spark.read / spark.sql
 
            5. Transformations
            - Joins, filters, business logic
 
            6. Target Tables
 
            7. Field Mapping
 
            8. Module Documentation
            - Each Scala file purpose
 
            9. Configuration
            - Explain properties files
 
            10. Usage
            - Maven + spark-submit
 
            11. Testing
 
            Use professional formatting with tables and sections.
 
      - name: Debug AI output length
        shell: bash
        run: |
          echo "AI response length (bytes): $(printf "%s" "$AI_OUTPUT" | wc -c)"
          echo "AI response tail:"
          printf "%s" "$AI_OUTPUT" | tail -n 30
        env:
          AI_OUTPUT: ${{ steps.ai.outputs.response }}
 
      - name: Write README file
        shell: bash
        run: |
          printf "%s" "$AI_OUTPUT" > README.md
        env:
          AI_OUTPUT: ${{ steps.ai.outputs.response }}
 
      - name: Commit README
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "Auto-generate README" || echo "No changes"
          git push
 
